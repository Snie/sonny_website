branches:
  - main

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: sec
          release: patch
        - breaking: true
          release: major

  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
      presetConfig:
        types:
          - type: feat
            section: "Features"
            hidden: false
          - type: fix
            section: "Bug Fixes"
            hidden: false
          - type: sec
            section: "Security"
            hidden: false
          - type: chore
            section: "Chores"
            hidden: true
          - type: docs
            section: "Documentation"
            hidden: true
          - type: refactor
            section: "Refactoring"
            hidden: true
          - type: test
            section: "Tests"
            hidden: true

  - "@semantic-release/changelog"

  - - "@semantic-release/npm"
    - npmPublish: false

  - - "@semantic-release/git"
    - assets:
        - CHANGELOG.md
        - package.json
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"

  - "@semantic-release/github"
